server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: educare-app

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  config:
    import: optional:file:backend/.env[.properties]

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── NEW: AWS Cognito Resource Server (replaces local JWT validation) ─────────
  # Spring Boot auto-configures a NimbusJwtDecoder that:
  #   1. Fetches the JWKS from the Cognito issuer's discovery endpoint.
  #   2. Validates the RS256 signature of every incoming Bearer token.
  # No code changes needed in SecurityConfig — just removing the explicit
  # customJwtDecoder and letting Spring Boot wire this automatically.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}


aws:
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}
  region: ap-southeast-1
  s3:
    bucket-name: educare-upload-2026

cognito:
  app-client-id: ${COGNITO_APP_CLIENT_ID}
  user-pool-id: ${COGNITO_USER_POOL_ID}

